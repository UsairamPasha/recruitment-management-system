<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Job</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-page">

<div class="container">
    <h2 style="text-align: center; color: #ec4899;margin: 30px;">Edit Job: {{ job.title }} 🌸</h2>
<br>
<div style="display: flex; justify-content: center;">
    <div class="auth-card mx-auto">
        <form method="post">
            <label class="form-label">Job Title</label>
            <input name="title" class="form-control" value="{{ job.title }}" required>

            <label class="form-label">Job Description</label>
            <textarea name="description" class="form-control" rows="4" required>{{ job.description }}</textarea>

            <label class="form-label">Minimum Merit %</label>
            <input name="min_merit" type="number" class="form-control" value="{{ job.min_merit }}" required>

            <label class="form-label">Maximum Applicants</label>
            <input name="max_applicants" type="number" class="form-control" value="{{ job.max_applicants }}" required>

            <button type="submit" class="btn-primary w-100 mt-2" style="margin-bottom: 20px;">Update Job ✨</button>
            <br>
            <a href="/admin/jobs" class="btn-secondary w-100 mt-2"   >Cancel</a>
        </form>
    </div>
</div>
</div>

<div id="flower-background"></div>
    
<!-- Include JS for flowers -->
<script src="{{ url_for('static', filename='js/flowers.js') }}"></script>
</body>
</html>
